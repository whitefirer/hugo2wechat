<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>微信预览 — {{ title }}</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.2/cropper.min.css">
<style>
:root{--bg:#1a1a2e;--panel:#16213e;--ink:#e4e4ee;--muted:#7c7c94;--accent:#07C160;--border:#2a2a4a}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh;overflow-x:hidden}

/* ── Toolbar ── */
.toolbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--border);flex-wrap:wrap}
.toolbar h2{font-size:15px;font-weight:600;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:120px}
.toolbar select{padding:6px 10px;border-radius:6px;border:1px solid #3a3a5a;background:#1a1a2e;color:var(--ink);font-size:13px;cursor:pointer}
.toolbar select:focus{outline:none;border-color:var(--accent)}

/* ── Main 3-column layout ── */
.main{display:flex;justify-content:center;align-items:flex-end;gap:16px;padding:24px 16px 40px;max-width:1480px;margin:0 auto}

/* ── Side panels ── */
.side-panel{width:340px;flex-shrink:0;background:var(--panel);border-radius:12px;border:1px solid var(--border);max-height:calc(100vh - 160px);display:flex;flex-direction:column;overflow:hidden;align-self:flex-end}
.side-panel.collapsed{visibility:hidden;pointer-events:none}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid var(--border);flex-shrink:0}
.panel-header h3{margin:0;font-size:13px;font-weight:600}
.panel-body{flex:1;overflow-y:auto;padding:12px}
.panel-close{background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px;padding:2px 6px;border-radius:4px}
.panel-close:hover{color:var(--ink);background:rgba(255,255,255,.05)}

/* ── Cover Editor ── */
.cover-feed-card{border-radius:8px;overflow:hidden;background:#1a1a2e;margin-bottom:12px}
.cover-large{position:relative;aspect-ratio:2.35/1;background:#2a2a4a;overflow:hidden;cursor:pointer}
.cover-large img{width:100%;height:100%;object-fit:cover}
.cover-large .placeholder{display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:13px}
.cover-text-overlay{position:absolute;bottom:0;left:0;right:0;padding:24px 12px 10px;background:linear-gradient(transparent,rgba(0,0,0,.7));color:#fff;font-size:15px;font-weight:600;line-height:1.4}
.cover-small-wrap{display:flex;align-items:center;gap:10px;padding:10px 12px}
.cover-small-wrap img{width:44px;height:44px;border-radius:4px;object-fit:cover;flex-shrink:0}
.cover-small-wrap .placeholder-small{width:44px;height:44px;border-radius:4px;background:#2a2a4a;flex-shrink:0}
.cover-meta{flex:1;min-width:0}
.cover-meta .cover-title{font-size:14px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cover-meta .cover-date{font-size:11px;color:var(--muted);margin-top:2px}
.cover-section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.cover-share-card{display:flex;gap:10px;background:#1a1a2e;border-radius:8px;padding:10px;margin-bottom:12px}
.share-card-img{width:48px;height:48px;border-radius:4px;overflow:hidden;flex-shrink:0;background:#2a2a4a;display:flex;align-items:center;justify-content:center}
.share-card-img img{width:100%;height:100%;object-fit:cover}
.share-card-img .placeholder{font-size:10px;color:var(--muted)}
.share-card-text{flex:1;min-width:0;display:flex;align-items:center}
.share-card-title{font-size:13px;font-weight:600;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;word-break:break-all}
.cover-actions{display:flex;gap:6px;flex-wrap:wrap}
.cover-actions .btn{padding:5px 10px;font-size:12px}

/* ── Edit mode ── */
.edit-section{margin-bottom:12px}
.edit-section-label{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
.tabs{display:flex;gap:2px;margin-bottom:8px;background:#1a1a2e;border-radius:6px;padding:2px}
.tab{flex:1;padding:6px 0;border:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;border-radius:5px;text-align:center;transition:all .2s}
.tab.active{background:var(--accent);color:#fff}
.tab:hover:not(.active){color:var(--ink)}
.image-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px;max-height:260px;overflow-y:auto}
.image-grid img{width:100%;aspect-ratio:16/9;object-fit:cover;border-radius:4px;cursor:pointer;border:2px solid transparent;transition:border-color .2s}
.image-grid img:hover{border-color:var(--accent)}
.image-grid img.selected{border-color:var(--accent)}
.crop-container{max-height:300px;margin:8px 0}
.crop-container img{max-width:100%;display:block}
.text-input-group{display:flex;gap:6px;margin-bottom:8px}
.text-input-group input{flex:1;padding:8px 10px;border-radius:6px;border:1px solid #3a3a5a;background:#1a1a2e;color:var(--ink);font-size:13px}
.text-input-group input:focus{outline:none;border-color:var(--accent)}
.text-options{display:flex;gap:8px;margin-bottom:8px}
.text-options select,.text-options input[type=color]{padding:4px 8px;border-radius:4px;border:1px solid #3a3a5a;background:#1a1a2e;color:var(--ink);font-size:12px}
.text-options input[type=color]{width:36px;height:30px;padding:2px;cursor:pointer}
.ai-prompts{display:flex;gap:4px;flex-wrap:wrap}
.ai-prompts button{padding:3px 8px;font-size:11px;border-radius:4px;border:1px solid #3a3a5a;background:transparent;color:var(--muted);cursor:pointer}
.ai-prompts button:hover{border-color:var(--accent);color:var(--accent)}

/* ── AI Chat ── */
.chat-messages{flex:1;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:10px}
.chat-msg{max-width:90%;padding:10px 14px;border-radius:12px;font-size:13px;line-height:1.6;word-break:break-word}
.chat-msg.assistant{align-self:flex-start;background:#1a1a2e;border-bottom-left-radius:4px}
.chat-msg.user{align-self:flex-end;background:var(--accent);color:#fff;border-bottom-right-radius:4px}
.chat-msg pre{background:rgba(0,0,0,.3);padding:10px 12px;border-radius:6px;overflow-x:auto;font-size:12px;line-height:1.5;margin:8px 0}
.chat-msg code{font-family:SF Mono,monospace;font-size:12px}
.chat-msg :not(pre)>code{background:rgba(0,0,0,.2);padding:2px 5px;border-radius:3px}
.chat-msg ul,.chat-msg ol{padding-left:18px;margin:4px 0}
.chat-msg li{margin:2px 0}
.chat-msg p{margin:4px 0}
.chat-msg strong{font-weight:600}
.chat-msg a{color:var(--accent)}
.chat-msg blockquote{border-left:3px solid var(--accent);padding-left:10px;margin:6px 0;opacity:.8}
.chat-msg table{border-collapse:collapse;width:100%;margin:6px 0;font-size:12px}
.chat-msg th,.chat-msg td{border:1px solid var(--border);padding:4px 8px;text-align:left}
.chat-msg th{background:rgba(0,0,0,.2)}
.chat-msg .typing{display:flex;gap:3px;padding:4px 0}
.chat-msg .typing span{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:typingBounce 1.4s infinite}
.chat-msg .typing span:nth-child(2){animation-delay:.2s}
.chat-msg .typing span:nth-child(3){animation-delay:.4s}
@keyframes typingBounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-6px)}}
.chat-input-area{display:flex;gap:6px;padding:8px 0;border-top:1px solid var(--border)}
.chat-input-area textarea{flex:1;padding:8px 10px;border-radius:8px;border:1px solid #3a3a5a;background:#1a1a2e;color:var(--ink);font-size:13px;resize:none;font-family:inherit}
.chat-input-area textarea:focus{outline:none;border-color:var(--accent)}
.chat-presets{display:flex;gap:4px;flex-wrap:wrap;padding-top:4px}

/* ── Phone (unchanged core) ── */
.phone-wrapper{position:relative;flex-shrink:0}
.phone{width:375px;background:#fff;border-radius:28px;overflow:hidden;box-shadow:0 0 0 3px #333,0 0 0 6px #222,0 0 0 8px #444,0 12px 40px rgba(0,0,0,.5);position:relative}
.phone-notch{height:28px;background:#111;display:flex;justify-content:center;align-items:flex-end;padding-bottom:4px;border-radius:28px 28px 0 0}
.phone-notch::after{content:'';width:80px;height:4px;background:#333;border-radius:2px}
.phone-screen{position:relative;overflow:hidden}
.phone-content{padding:0 14px 24px;min-height:calc(100vh - 160px);background:#fff;color:#3f3f3f;overflow-y:auto;overflow-x:hidden;max-height:calc(100vh - 160px);position:relative;border-radius:0 0 28px 28px}
.phone-content *{max-width:100%!important;word-break:break-word}
.phone-content pre,.phone-content pre *{max-width:none!important;white-space:pre!important;word-break:normal!important}
.phone.dark{background:#000;color:#f5f5f7}
.phone.dark .phone-content{background:#000;color:#f5f5f7}

/* 暗色模式:加粗/表格/链接可读性,.phone-content * 全覆盖已去除 */
.phone.dark .phone-content strong,
.phone.dark .phone-content b { color: #4fd1c5 !important; }
.phone.dark .phone-content em,
.phone.dark .phone-content i { color: #a7f3d0 !important; }
.phone.dark .phone-content th { background:#2a2a2a !important; color:#f5f5f7 !important; border-color:#444 !important; }
.phone.dark .phone-content td { color:#f5f5f7 !important; border-color:#444 !important; }
.phone.dark .phone-content blockquote { border-left-color:#52525b !important; color:#a1a1aa !important; }
.phone.dark .phone-content ol { padding-left:1.5em !important; }
.phone.dark .phone-content ol,
.phone.dark .phone-content ul,
.phone.dark .phone-content li { color:#f5f5f7 !important; }
.phone.dark .phone-content h1,
.phone.dark .phone-content h2,
.phone.dark .phone-content h3,
.phone.dark .phone-content h4,
.phone.dark .phone-content h5,
.phone.dark .phone-content h6 { color:#f5f5f7 !important; }
.phone.dark .phone-content em,
.phone.dark .phone-content i { color:#a7f3d0 !important; }
.phone.dark .phone-content a { color:#34d399 !important; }
.phone.dark .phone-content a { color:#34d399 !important; }
.phone.dark .phone-content [style*="color:rgba(0, 0, 0, 0.4)"] { color:rgba(245,245,247,0.6)!important; }
/* 底部 dock:亮色模式 */
.phone-bdock{display:flex;justify-content:center;gap:20px;padding:10px 0 14px;border-top:1px solid rgba(0,0,0,.06);border-radius:0 0 28px 28px}
.bdock-icon{width:36px;height:36px;border-radius:8px;border:none;background:rgba(0,150,136,.1);color:#009688;cursor:pointer;display:flex;align-items:center;justify-content:center}
.bdock-icon:hover{background:rgba(0,150,136,.2)}
/* 暗色模式:dock 保持亮色外观(和公众号手机端一致) */
.phone-bdock-dark{background:#fff !important;border-top:1px solid rgba(0,0,0,.06) !important}
.phone-bdock-dark .bdock-icon{background:rgba(0,150,136,.1) !important;color:#009688 !important}
.phone-bdock-dark .bdock-icon:hover{background:rgba(0,150,136,.2) !important}

/* ── Sheet panels (inside phone) ── */
.sheet-backdrop{position:absolute;inset:0;background:rgba(0,0,0,.4);z-index:14;opacity:0;pointer-events:none;transition:opacity .3s}
.sheet-backdrop.show{opacity:1;pointer-events:auto}
.sheet-panel{position:absolute;left:0;right:0;max-height:60%;background:rgba(255,255,255,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:16px 16px 0 0;z-index:15;overflow-y:auto;padding:20px 16px;opacity:0;pointer-events:none;transition:opacity .2s,transform .35s cubic-bezier(.4,0,.2,1);border:1px solid rgba(255,255,255,.3)}
.sheet-panel.open{opacity:1;pointer-events:auto}
.sheet-bottom{bottom:60px;transform:translateY(120%)}
.sheet-bottom.open{transform:translateY(0)}
.sheet-top{top:0;border-radius:0 0 16px 16px;transform:translateY(-130%)}
.sheet-top.open{transform:translateY(0)}
.sheet-panel *{color:#3f3f3f}
.phone.dark .sheet-panel{background:rgba(28,28,30,.94);border-color:rgba(255,255,255,.08)}
.phone.dark .sheet-panel *{color:#f5f5f7!important}
.phone.dark .sheet-backdrop{background:rgba(0,0,0,.6)}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.15);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,.3)}

/* ── Code highlight ── */
.hljs-keyword{color:#c678dd!important}.hljs-string{color:#98c379!important}.hljs-number{color:#d19a66!important}.hljs-comment{color:#5c6370!important;font-style:italic!important}.hljs-function{color:#61afef!important}.hljs-attr{color:#d19a66!important}.hljs-built_in{color:#e6c07b!important}.hljs-type{color:#e6c07b!important}.hljs-literal{color:#d19a66!important}.hljs-params{color:#abb2bf!important}.hljs-selector-class{color:#e6c07b!important}.hljs-meta{color:#61afef!important}.hljs-title{color:#61afef!important}.hljs-punctuation{color:#abb2bf!important}

/* ── Shared UI ── */
.log-area{max-height:50vh;overflow-y:auto;font-size:12px;color:var(--muted);font-family:SF Mono,monospace;line-height:1.7}
.log-entry{font-size:12px;color:var(--muted);font-family:SF Mono,monospace;line-height:1.7;padding:2px 0;border-bottom:1px solid var(--border)}
.log-entry.ok{color:#3ecf8e}
.log-entry.fail{color:#e94560}
.toggle-switch{position:relative;display:inline-block;width:44px;height:24px}
.toggle-switch input{opacity:0;width:0;height:0}
.toggle-slider{position:absolute;cursor:pointer;inset:0;background:#3a3a5a;border-radius:24px;transition:.3s}
.toggle-slider::before{content:'';position:absolute;height:18px;width:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.toggle-slider{background:var(--accent)}
input:checked+.toggle-slider::before{transform:translateX(20px)}
.loading{display:flex;align-items:center;justify-content:center;height:400px;color:#999;font-size:14px}
.error{color:#e94560;padding:20px;text-align:center}
.badge{font-size:11px;padding:3px 8px;border-radius:10px;background:#0f02;color:var(--accent);border:1px solid #0f03}
.actions{display:flex;gap:8px;align-items:center}
.btn{padding:6px 12px;border-radius:6px;border:1px solid #3a3a5a;background:#1a1a2e;color:var(--ink);font-size:12px;cursor:pointer;text-decoration:none;white-space:nowrap;display:inline-flex;align-items:center;gap:4px}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{opacity:.9}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid #3a3a5a;border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.progress-log{position:absolute;bottom:0;left:0;right:0;max-height:200px;overflow-y:auto;padding:12px 14px;font-size:12px;color:#7c7c94;font-family:SF Mono,monospace;pointer-events:none}
.progress-log div{line-height:1.6;white-space:nowrap}
footer{text-align:center;padding:20px 16px 40px;color:var(--muted);font-size:13px;line-height:1.8}
footer a{color:var(--accent);text-decoration:none}

/* ── Responsive ── */
@media(max-width:1250px){
  .side-panel{position:fixed;bottom:0;z-index:30;width:320px;border-radius:12px 12px 0 0;max-height:70vh;align-self:auto}
  .side-panel-left{left:16px;transform:translateY(100%)}
  .side-panel-left.open{transform:translateY(0)}
  .side-panel-right{right:16px;transform:translateY(100%)}
  .side-panel-right.open{transform:translateY(0)}
  .side-panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:29;display:none}
  .side-panel-overlay.show{display:block}
}
</style>
</head>
<body>

<!-- ── Toolbar ── -->
<div class="toolbar">
  <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 72 72" style="flex-shrink:0"><g fill="none" fill-rule="evenodd"><path stroke="#000" stroke-opacity=".1" stroke-width=".5" d="M20.3.5h30.3c6.9 0 9.4.7 12 2a14 14 0 0 1 5.8 5.9c1.4 2.5 2.1 5 2.1 12v30.2c0 7-.7 9.5-2.1 12a14 14 0 0 1-5.8 5.8c-2.6 1.4-5.1 2.1-12 2.1H20.2c-6.9 0-9.4-.7-12-2.1a14 14 0 0 1-5.8-5.8C1.1 60.1.4 57.5.4 50.6V20.4c0-7 .7-9.5 2.1-12a14 14 0 0 1 5.8-5.9c2.6-1.3 5.1-2 12-2z"/><path fill="#07C160" d="M51.8 20.5c-2.6-5.4-9.2-9.9-16.6-9.9-3.9 0-9.8 1.3-14.3 6.7-3 3.6-4 7.8-3.3 12 .4 2.9 2 6.7 4.3 9 .9-6 4.1-10.8 8.3-14.3 7.6-5.8 15.7-5.5 21.6-3.5"/><path fill="#07C160" d="M57.7 29.6c-4.7-6-12.7-7.7-20-5 .2 0 .5.1.7.2 10.8 3.7 16.6 15.3 13 26a20.2 20.2 0 0 1-4.4 7.4c2.3-.6 4.7-1.5 6.7-3.1 8.2-6.3 9.8-17.9 4-25.5"/><path fill="#07C160" d="M35.2 48.8c-1.6 0-3.2-.2-4.7-.5a2.3 2.3 0 0 0-.6 0c-.4 0-.8.2-1.2.5l-5 3.2c-.2 0-.3.1-.5.1a.8.8 0 0 1-.8-.7c0-.2 0-.4.1-.6l.9-4c0-.2 0-.3 0-.5a1.6 1.6 0 0 0-.7-1.3C17 41 13.4 35.4 12.6 29.6c-1.4 2.1-2 3.7-2.7 6.2-2.6 9 3 19.8 12.3 22.8 10.6 3.5 20.7-.4 24.2-9.4.4-1.1.9-3 1-4.5-3.7 2.7-7.7 3.9-12.6 3.9"/></g></svg>
  <h2>{{ title }}</h2>
  <span class="badge">预览</span>
  <select id="themeSelect" onchange="switchTheme(this.value)">{{ theme_options | safe }}</select>
  <div class="actions">
    <button class="btn" onclick="togglePanel('left')" title="封面编辑器">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> 封面
    </button>
    <button class="btn" onclick="togglePanel('right')" title="AI 助手">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg> AI
    </button>
    <a href="https://github.com/whitefirer/hugo2wechat" target="_blank" class="btn" title="GitHub">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg> GitHub
    </a>
    <button class="btn" onclick="copyHTML(this)">复制 HTML</button>
  </div>
</div>

<!-- ── Main Layout ── -->
<div class="main">

  <!-- Left Panel: Cover Editor -->
  <aside class="side-panel side-panel-left" id="coverPanel">
    <div class="panel-header">
      <h3>🎨 文章封面</h3>
      <button class="panel-close" onclick="togglePanel('left')">✕</button>
    </div>
    <div class="panel-body">

      <!-- Preview Mode -->
      <div id="coverPreviewMode">
        <!-- 大封面：推送展示 -->
        <div class="cover-section-label">推送展示</div>
        <div class="cover-feed-card" style="margin-bottom:16px">
          <div class="cover-large" id="coverLargeBox" onclick="enterCoverEdit()">
            <div class="placeholder" id="coverLargePlaceholder">点击选择封面图</div>
            <img id="coverLargeImg" src="" style="display:none" alt="大封面">
          </div>
          <div class="cover-small-wrap">
            <div class="cover-meta" style="flex:1">
              <div class="cover-title" id="coverTitlePreview">{{ title }}</div>

<script>
/* 暗色模式后处理:纯黑色 → 白色,记录原值供还原 */
const darkAdapted = new WeakSet();
function adaptDark(root) {
  if (!root) return;
  root.querySelectorAll('[style*="color"]').forEach(el => {
    if (darkAdapted.has(el)) return;
    const style = el.getAttribute('style');
    let m = style.match(/color:\s*rgba\(0,\s*0,\s*0,\s*([\d.]+)\)/i);
    if (!m) m = style.match(/color:\s*rgba\(1,\s*1,\s*1,\s*([\d.]+)\)/i);
    if (!m) m = style.match(/color:\s*rgb\(0,\s*0,\s*0\)/i);
    if (!m) m = style.match(/color:\s*rgb\(1,\s*1,\s*1\)/i);
    if (m) {
      el.dataset.orig = style;
      const alpha = m[1] || '1';
      el.style.color = 'rgba(245, 245, 247, ' + alpha + ')';
      darkAdapted.add(el);
    }
  });
}
function restoreLight(root) {
  if (!root) return;
  root.querySelectorAll('[style*="color"]').forEach(el => {
    if (darkAdapted.has(el) && el.dataset.orig) {
      el.setAttribute('style', el.dataset.orig);
      darkAdapted.delete(el);
      delete el.dataset.orig;
    }
  });
}


const SLUG = {{ slug | tojson }};
const ARTICLE_TITLE = {{ title | tojson }};
let copyHTMLData = '';

// ── Theme ──
const themeNames = {{ theme_names | tojson }};
const defaultTheme = {{ default_theme | tojson }};

async function render(theme) {
  let log = [];
  let startTime = Date.now();
  const elapsed = () => Math.floor((Date.now() - startTime) / 1000);

  const updateLoading = (step, done) => {
    const ts = '[' + elapsed() + 's]';
    if (!done) {
      log.push(ts + ' ' + step + '...');
      addLogEntry(ts + ' ' + step + '...', '');
    } else {
      log.push('<span style="color:#3ecf8e">' + ts + ' ✓ ' + step + '</span>');
      addLogEntry(ts + ' ✓ ' + step, 'ok');
    }
    const entries = log.slice(-12).map(e => '<div>' + e + '</div>').join('');
    const current = log[log.length-1];
    const isDone = current && current.includes('✓');
    const html = '<div class="loading">'
      + (isDone ? '✅ 完成' : '<span class="spinner"></span>' + (step + '...'))
      + '</div>'
      + '<div class="progress-log">' + entries + '</div>';
    document.getElementById('phoneContent').innerHTML = html;
  };

  updateLoading('预处理', false);

  const url = '/api/render/' + SLUG + (theme ? '?theme=' + encodeURIComponent(theme) : '');
  const es = new EventSource(url);
  es.addEventListener('progress', (e) => {
    const data = JSON.parse(e.data);
    if (data.status === 'running') updateLoading(data.step, false);
    else if (data.status === 'done') updateLoading(data.step, true);
  });
  es.addEventListener('result', (e) => {
    es.close();
    const data = JSON.parse(e.data);
    document.getElementById('phoneContent').innerHTML = data.html + '<div class="progress-log" style="background:none;color:#3ecf8e">✅ 完成 (预处理:' + (data.steps['预处理']||'') + ' 排版:' + (data.steps['排版']||'') + ')</div>';
    setTimeout(() => { const log = document.querySelector('.progress-log'); if (log) log.style.display = 'none'; }, 3000);
    addLogEntry('✅ 完成', 'ok');
    copyHTMLData = data.copy_html || data.html;
    if (data.steps) {
      let info = [];
      for (const [k,v] of Object.entries(data.steps)) info.push(k + ': ' + v);
      const badge = document.querySelector('.badge');
      if (badge) badge.title = info.join(', ');
    }
    // Load article images after render
    loadArticleImages();
  });
  es.addEventListener('error', (e) => {
    es.close();
    let msg = '渲染失败';
    try { const d = JSON.parse(e.data); msg = d.error || msg; } catch(_) {}
    document.getElementById('phoneContent').innerHTML = '<div class="error">' + msg + '</div>';
  });
  es.onerror = (e) => { if (es.readyState === EventSource.CLOSED) { es.close(); } };
}

function addLogEntry(msg, type) {
  const cls = type === 'ok' ? 'ok' : (type === 'fail' ? 'fail' : '');
  const entry = '<div class="log-entry ' + cls + '">' + msg + '</div>';
  document.querySelectorAll('.log-area').forEach(el => {

  const panel = document.getElementById(side === 'left' ? 'coverPanel' : 'chatPanel');
  const other = document.getElementById(side === 'left' ? 'chatPanel' : 'coverPanel');
  const isOpen = panel.classList.contains('open') || !panel.classList.contains('collapsed');

}

// ── Copy HTML ──
function fallbackCopy(btn) {
  navigator.clipboard.writeText(document.getElementById('phoneContent').innerText).then(() => {
    btn.textContent = '✅ 已复制(纯文本)';
    setTimeout(() => btn.textContent = '📋 复制 HTML', 1500);
  }).catch(() => alert('复制失败，请手动全选复制'));
}

async function copyHTML(btn) {
  if (!copyHTMLData) return;
  try {
    let html = copyHTMLData;
    const container = document.createElement('div');
    container.innerHTML = html;
    const hljsMap = {
      keyword:'#c678dd', string:'#98c379', number:'#d19a66', comment:'#5c6370',
      function:'#61afef', attr:'#d19a66', built_in:'#e6c07b', type:'#e6c07b',
      literal:'#d19a66', title:'#61afef', meta:'#61afef', punctuation:'#abb2bf',
      params:'#abb2bf', 'selector-class':'#e6c07b'
    };
    container.querySelectorAll('[class*="hljs-"]').forEach(el => {
      for (const cls of el.classList) {
        if (hljsMap[cls.replace('hljs-','')]) {
          el.style.color = hljsMap[cls.replace('hljs-','')];
        }
      }
    });
    const svgs = container.querySelectorAll('svg');
    if (svgs.length > 0) {
      btn.textContent = '⏳ 转换中...';
      for (const svg of svgs) {
        try {
          const svgData = new XMLSerializer().serializeToString(svg);
          const b64 = btoa(unescape(encodeURIComponent(svgData)));
          svg.outerHTML = '<img src="data:image/svg+xml;base64,' + b64 + '" style="max-width:100%;height:auto;display:block;margin:1.2em auto" width="100%" alt="diagram"/>';
        } catch(e) {}
      }
    }
    html = container.innerHTML;
    const blob = new Blob([html], {type: 'text/html'});
    navigator.clipboard.write([new ClipboardItem({'text/html': blob})]).then(() => {
      btn.textContent = '✅ 已复制';
      setTimeout(() => btn.textContent = '📋 复制 HTML', 1500);
    }).catch(() => fallbackCopy(btn));
  } catch(e) { fallbackCopy(btn); }
}

let coverState = {
  mode: 'preview',        // 'preview' | 'edit'
  imageSource: 'article', // 'article' | 'ai'
  cropType: 'large',      // 'large' | 'small'
  selectedImage: null,    // data URL of selected image
  croppedLarge: null,     // cropped canvas data URL (large)
  croppedSmall: null,     // cropped canvas data URL (small)
  coverText: ARTICLE_TITLE,
  coverFont: 'system-ui, -apple-system, sans-serif',
  coverTextColor: '#ffffff',
  cropper: null,
  articleImages: []
};

// Fetch article images from rendered HTML
async function loadArticleImages() {
  try {
    const resp = await fetch('/api/article-images/' + SLUG);
    const data = await resp.json();
    if (data.images && data.images.length > 0) {
      coverState.articleImages = data.images;
      renderArticleImageGrid();
      // Auto-select first image if none selected
      if (!coverState.selectedImage) {
        selectCoverImage(data.images[0]);
      }
    }
  } catch(e) {
    console.error('Failed to load article images:', e);
  }
}

function renderArticleImageGrid() {
  const grid = document.getElementById('articleImagesGrid');
  grid.innerHTML = coverState.articleImages.map((src, i) =>
    '<img src="' + src + '" onclick="selectCoverImage(coverState.articleImages[' + i + '], this)" class="' + (coverState.selectedImage === src ? 'selected' : '') + '" loading="lazy">'
  ).join('');
}

function selectCoverImage(src, el) {
  coverState.selectedImage = src;
  coverState.croppedLarge = null;
  coverState.croppedSmall = null;
  // Update grid selection
  document.querySelectorAll('#articleImagesGrid img').forEach(img => img.classList.remove('selected'));
  if (el) el.classList.add('selected');
  // Show in crop section
  showCropSection();
  // Update preview
  updateCoverPreview();
}

function showCropSection() {
  const section = document.getElementById('cropSection');
  section.style.display = 'block';
  const img = document.getElementById('cropImage');
  img.src = coverState.selectedImage;
  // Destroy existing cropper
  if (coverState.cropper) {
    coverState.cropper.destroy();
    coverState.cropper = null;
  }
  // Init cropper after image loads
  img.onload = () => {
    const ratio = coverState.cropType === 'large' ? 900/383 : 1/1;
    coverState.cropper = new Cropper(img, {
      aspectRatio: ratio,
      viewMode: 2,
      autoCropArea: 0.8,
      responsive: true,
      background: false
    });
  };
}

function switchImageSource(source) {
  coverState.imageSource = source;
  document.getElementById('tabArticle').classList.toggle('active', source === 'article');
  document.getElementById('tabAI').classList.toggle('active', source === 'ai');
  document.getElementById('articleImagesGrid').style.display = source === 'article' ? '' : 'none';
  document.getElementById('aiImagePanel').style.display = source === 'ai' ? '' : 'none';
}

function switchCropType(type) {
  coverState.cropType = type;
  document.getElementById('cropTabLarge').classList.toggle('active', type === 'large');
  document.getElementById('cropTabSmall').classList.toggle('active', type === 'small');
  if (coverState.cropper && coverState.selectedImage) {
    const ratio = type === 'large' ? 900/383 : 1/1;
    coverState.cropper.setAspectRatio(ratio);
  }
}

function applyCrop() {
  if (!coverState.cropper) return;
  const canvas = coverState.cropper.getCroppedCanvas();
  if (!canvas) return;
  const dataUrl = canvas.toDataURL('image/png');
  if (coverState.cropType === 'large') {
    coverState.croppedLarge = dataUrl;
  } else {
    coverState.croppedSmall = dataUrl;
  }
  updateCoverPreview();
}

function updateCoverPreview() {
  coverState.coverText = document.getElementById('coverTextInput').value;
  coverState.coverFont = document.getElementById('coverFontSelect').value;
  coverState.coverTextColor = document.getElementById('coverTextColor').value;

  const largeSrc = coverState.croppedLarge || coverState.selectedImage;
  const smallSrc = coverState.croppedSmall || coverState.selectedImage;

  const largeImg = document.getElementById('coverLargeImg');
  const largePlaceholder = document.getElementById('coverLargePlaceholder');
  const smallImg = document.getElementById('coverSmallImg');
  const smallPlaceholder = document.getElementById('coverSmallPlaceholder');

  if (largeSrc) {
    largeImg.src = largeSrc;
    largeImg.style.display = '';
    largePlaceholder.style.display = 'none';
  } else {
    largeImg.style.display = 'none';
    largePlaceholder.style.display = '';
  }
  if (smallSrc) {
    smallImg.src = smallSrc;
    smallImg.style.display = '';
    smallPlaceholder.style.display = 'none';
  } else {
    smallImg.style.display = 'none';
    smallPlaceholder.style.display = '';
  }

  // Update feed card title and share card
  document.getElementById('coverTitlePreview').textContent = coverState.coverText || ARTICLE_TITLE;
  document.getElementById('shareCardTitle').textContent = coverState.coverText || ARTICLE_TITLE;
}

function enterCoverEdit() {
  coverState.mode = 'edit';
  document.getElementById('coverPreviewMode').style.display = 'none';
  document.getElementById('coverEditMode').style.display = '';
  document.getElementById('coverTextInput').value = coverState.coverText;
  if (coverState.selectedImage) {
    showCropSection();
  }
  // Load images if not yet loaded
  if (coverState.articleImages.length === 0) {
    loadArticleImages();
  }
}

function exitCoverEdit() {
  updateCoverPreview();
  coverState.mode = 'preview';
  document.getElementById('coverEditMode').style.display = 'none';
  document.getElementById('coverPreviewMode').style.display = '';
  // Destroy cropper to free memory
  if (coverState.cropper) {
    coverState.cropper.destroy();
    coverState.cropper = null;
  }
}

// ── Cover: AI Text Generation ──
async function generateCoverText() {
  const btn = event.target;
  const orig = btn.textContent;
  btn.textContent = '...';
  btn.disabled = true;
  try {
    const resp = await fetch('/api/cover/ai-text', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({title: ARTICLE_TITLE, summary: '', count: 3})
    });
    const data = await resp.json();
    const resultsDiv = document.getElementById('aiTextResults');
    if (data.texts && data.texts.length > 0) {
      resultsDiv.innerHTML = data.texts.map((t, i) =>
        '<button class="btn" onclick="document.getElementById(\'coverTextInput\').value=\'' + t.replace(/'/g, "\\'") + '\';updateCoverPreview()" style="text-align:left">' + t + '</button>'
      ).join('');
    } else {
      resultsDiv.innerHTML = '<span style="font-size:12px;color:var(--muted)">' + (data.error || 'AI 服务未配置，请在环境变量中设置 API key') + '</span>';
    }
  } catch(e) {
    document.getElementById('aiTextResults').innerHTML = '<span style="font-size:12px;color:#e94560">请求失败: ' + e.message + '</span>';
  }
  btn.textContent = orig;
  btn.disabled = false;
}

// ── Cover: AI Image Generation ──
async function generateAIImage() {
  const prompt = document.getElementById('aiImagePrompt').value.trim();
  if (!prompt) return;
  const loading = document.getElementById('aiImageLoading');
  const results = document.getElementById('aiImageResults');
  const btn = document.getElementById('aiImageBtn');
  btn.disabled = true;
  loading.style.display = '';
  results.innerHTML = '';
  try {
    const resp = await fetch('/api/cover/ai-image', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({prompt: prompt})
    });
    const data = await resp.json();
    if (data.images && data.images.length > 0) {
      results.innerHTML = data.images.map((src, i) =>
        '<img src="' + src + '" onclick="selectCoverImage(\'' + src + '\', this)" loading="lazy">'
      ).join('');
    } else {
      results.innerHTML = '<span style="font-size:12px;color:var(--muted);grid-column:1/-1;text-align:center;padding:20px">' + (data.error || 'AI 生图服务未配置') + '</span>';
    }
  } catch(e) {
    results.innerHTML = '<span style="font-size:12px;color:#e94560;grid-column:1/-1;text-align:center;padding:20px">请求失败: ' + e.message + '</span>';
  }
  loading.style.display = 'none';
  btn.disabled = false;
}

// ── Cover: Copy ──
async function copyCoverImage() {
  const src = coverState.croppedLarge || coverState.selectedImage;
  if (!src) { alert('请先选择封面图'); return; }
  try {
    if (src.startsWith('data:')) {
      // Convert base64 to blob
      const resp = await fetch(src);
      const blob = await resp.blob();
      await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
    } else {
      // URL: fetch then copy
      const resp = await fetch(src);
      const blob = await resp.blob();
      await navigator.clipboard.write([new ClipboardItem({[blob.type]: blob})]);
    }
    showCopyToast('封面图已复制');
  } catch(e) {
    // Fallback: open image in new tab for manual copy
    window.open(src, '_blank');
    showCopyToast('已在新标签页打开，请手动复制');
  }
}

function copyCoverText() {
  const text = document.getElementById('coverTextInput').value || ARTICLE_TITLE;
  navigator.clipboard.writeText(text).then(() => showCopyToast('封面文字已复制')).catch(() => showCopyToast('复制失败'));
}

function showCopyToast(msg) {
  let toast = document.getElementById('copyToast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'copyToast';
    toast.style.cssText = 'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:8px 20px;border-radius:20px;font-size:13px;z-index:100;transition:opacity .3s;pointer-events:none';
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.opacity = '1';
  clearTimeout(toast._timeout);
  toast._timeout = setTimeout(() => toast.style.opacity = '0', 2000);
}

// ═══════════════════════════════════════════
// ── AI Chat ──
// ═══════════════════════════════════════════

async function sendChat() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  appendChatMessage(msg, 'user');
  appendChatTyping();
  try {
    const resp = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: msg, slug: SLUG, title: ARTICLE_TITLE})
    });
    // Try SSE streaming first
    if (resp.headers.get('content-type')?.includes('text/event-stream')) {
      removeTyping();
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let rawText = '';
      let msgDiv = appendChatMessage('', 'assistant');
      while (true) {
        const {done, value} = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, {stream: true});
        const lines = buffer.split('\n');
        buffer = lines.pop();
        for (const line of lines) {
          if (line.startsWith('data: ')) {
            try {
              const data = JSON.parse(line.slice(6));
              if (data.text) { rawText += data.text; msgDiv.innerHTML = md2html(rawText); scrollChat(); }
              if (data.error) { rawText = data.error; msgDiv.innerHTML = md2html(rawText); scrollChat(); }
            } catch(e) {}
          }
        }
      }
    } else {
      // JSON response
      removeTyping();
      const data = await resp.json();
      const reply = data.reply || data.error || '无响应';
      appendChatMessage(reply, 'assistant');
    }
  } catch(e) {
    removeTyping();
    appendChatMessage('请求失败: ' + e.message, 'assistant');
  }
}

function sendPreset(text) {
  document.getElementById('chatInput').value = text;
  sendChat();
}

function md2html(text) {
  if (typeof marked === 'undefined') return text;
  return marked.parse(text, {breaks: true, gfm: true});
}

function scrollChat() {
  const container = document.getElementById('chatMessages');
  container.scrollTop = container.scrollHeight;
}

function appendChatMessage(msg, role) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg ' + role;
  try { div.innerHTML = md2html(msg); } catch(e) { div.textContent = msg; }
  container.appendChild(div);
  scrollChat();
  return div;
}

function appendChatTyping() {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.id = 'typingIndicator';
  div.innerHTML = '<div class="typing"><span></span><span></span><span></span></div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typingIndicator');
  if (el) el.remove();
}

function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

// ── Init ──
render(defaultTheme);
// Both panels visible by default on desktop
if (window.innerWidth > 1250) {
  document.getElementById('coverPanel').classList.remove('collapsed');
  document.getElementById('chatPanel').classList.remove('collapsed');
}
