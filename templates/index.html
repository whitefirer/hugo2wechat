<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>微信预览 — 文章列表</title>
<style>
:root{--bg:#1a1a2e;--panel:#16213e;--ink:#e4e4ee;--accent:#07C160}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--ink);min-height:100vh}
header{display:flex;align-items:center;gap:12px;padding:16px 20px;background:var(--panel);border-bottom:1px solid #2a2a4a}
header svg{flex-shrink:0}
header h1{font-size:18px;font-weight:600}
main{max-width:680px;margin:40px auto;padding:0 20px}
main ul{list-style:none}
main li{margin:4px 0}
main a{display:block;padding:12px 16px;border-radius:8px;color:var(--ink);text-decoration:none;line-height:1.6;transition:background .2s}
main a:hover{background:var(--panel);color:var(--accent)}
main a .date{font-size:12px;color:#7c7c94;margin-left:8px}
footer{text-align:center;padding:40px 16px;color:#7c7c94;font-size:13px}
footer a{color:var(--accent);text-decoration:none}
</style>
</head>
<body>
<header>
  <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 72 72"><g fill="none" fill-rule="evenodd"><path stroke="#000" stroke-opacity=".1" stroke-width=".5" d="M20.3.5h30.3c6.9 0 9.4.7 12 2a14 14 0 0 1 5.8 5.9c1.4 2.5 2.1 5 2.1 12v30.2c0 7-.7 9.5-2.1 12a14 14 0 0 1-5.8 5.8c-2.6 1.4-5.1 2.1-12 2.1H20.2c-6.9 0-9.4-.7-12-2.1a14 14 0 0 1-5.8-5.8C1.1 60.1.4 57.5.4 50.6V20.4c0-7 .7-9.5 2.1-12a14 14 0 0 1 5.8-5.9c2.6-1.3 5.1-2 12-2z"/><path fill="#07C160" d="M51.8 20.5c-2.6-5.4-9.2-9.9-16.6-9.9-3.9 0-9.8 1.3-14.3 6.7-3 3.6-4 7.8-3.3 12 .4 2.9 2 6.7 4.3 9 .9-6 4.1-10.8 8.3-14.3 7.6-5.8 15.7-5.5 21.6-3.5"/><path fill="#07C160" d="M57.7 29.6c-4.7-6-12.7-7.7-20-5 .2 0 .5.1.7.2 10.8 3.7 16.6 15.3 13 26a20.2 20.2 0 0 1-4.4 7.4c2.3-.6 4.7-1.5 6.7-3.1 8.2-6.3 9.8-17.9 4-25.5"/><path fill="#07C160" d="M35.2 48.8c-1.6 0-3.2-.2-4.7-.5a2.3 2.3 0 0 0-.6 0c-.4 0-.8.2-1.2.5l-5 3.2c-.2 0-.3.1-.5.1a.8.8 0 0 1-.8-.7c0-.2 0-.4.1-.6l.9-4c0-.2 0-.3 0-.5a1.6 1.6 0 0 0-.7-1.3C17 41 13.4 35.4 12.6 29.6c-1.4 2.1-2 3.7-2.7 6.2-2.6 9 3 19.8 12.3 22.8 10.6 3.5 20.7-.4 24.2-9.4.4-1.1.9-3 1-4.5-3.7 2.7-7.7 3.9-12.6 3.9"/></g></svg>
  <h1>文章列表</h1>
</header>
<main>
  <ul>
    {% for post in posts %}
    <li><a href="/preview/{{ post.slug }}">{{ post.title }}<span class="date">{{ post.date }}</span></a></li>
    {% endfor %}
  </ul>
</main>
<footer>&copy; whitefirer &middot; <a href="https://github.com/whitefirer/hugo2wechat">hugo2wechat</a> on GitHub</footer>
</body>
</html>
